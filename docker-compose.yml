services:
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    environment:
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://kafka:29093,EXTERNAL://0.0.0.0:9094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
      CLUSTER_ID: "jmIWeHreQQSJvtSKYd_Z5g"
      KAFKA_HEAP_OPTS: "-Xmx512M -Xms512M"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 15s
      retries: 12
      start_period: 30s
    ports:
      - "9094:9094"   # external listener; tests/host clients use localhost:9094
    restart: unless-stopped

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["bash", "-c"]
    command:
      - |
        set -e
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic events.normalized --partitions 3 --replication-factor 1 \
          --config retention.ms=2592000000
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic events.scored --partitions 3 --replication-factor 1 \
          --config retention.ms=2592000000
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic alerts.outgoing --partitions 1 --replication-factor 1 \
          --config retention.ms=7776000000
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic events.dlq --partitions 1 --replication-factor 1 \
          --config retention.ms=1209600000
        echo "Topics created."
    restart: "no"

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: rates
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: rates
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rates -d rates"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "5432:5432"   # for host-side tests during dev
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: services/migrate/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_URL: "postgresql+psycopg://rates:${POSTGRES_PASSWORD:-changeme}@postgres:5432/rates"
    restart: "no"

  ingestor-cnbc:
    build:
      context: .
      dockerfile: services/ingestors/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKERS: "kafka:9092"
      POSTGRES_URL: "postgresql://rates:${POSTGRES_PASSWORD:-changeme}@postgres:5432/rates"
      CNBC_RSS_URLS: "${CNBC_RSS_URLS}"
      POLL_INTERVAL_SECONDS: "${POLL_INTERVAL_SECONDS:-60}"
    restart: unless-stopped

  ingestor-truth:
    build:
      context: .
      dockerfile: services/ingestors/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKERS: "kafka:9092"
      POSTGRES_URL: "postgresql://rates:${POSTGRES_PASSWORD:-changeme}@postgres:5432/rates"
      TRUTH_SOCIAL_USERNAMES: "${TRUTH_SOCIAL_USERNAMES}"
      TRUTHSOCIAL_USERNAME: "${TRUTHSOCIAL_USERNAME}"
      TRUTHSOCIAL_PASSWORD: "${TRUTHSOCIAL_PASSWORD}"
      POLL_INTERVAL_SECONDS: "${TRUTH_POLL_INTERVAL_SECONDS:-30}"
    command: ["python", "-m", "services.ingestors.truth_social.main"]
    restart: unless-stopped

  scorer:
    build:
      context: .
      dockerfile: services/scorer/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKERS: "kafka:9092"
      POSTGRES_URL: "postgresql://rates:${POSTGRES_PASSWORD:-changeme}@postgres:5432/rates"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      SCORER_MODEL: "${SCORER_MODEL:-claude-haiku-4-5}"
      SCORER_TIMEOUT_SECONDS: "${SCORER_TIMEOUT_SECONDS:-30}"
    restart: unless-stopped

  alerter:
    build:
      context: .
      dockerfile: services/alerter/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKERS: "kafka:9092"
      POSTGRES_URL: "postgresql://rates:${POSTGRES_PASSWORD:-changeme}@postgres:5432/rates"
      TWILIO_ACCOUNT_SID: "${TWILIO_ACCOUNT_SID}"
      TWILIO_AUTH_TOKEN: "${TWILIO_AUTH_TOKEN}"
      TWILIO_FROM: "${TWILIO_FROM}"
      ALERT_RECIPIENT: "${ALERT_RECIPIENT}"
      ALERT_CHANNEL: "${ALERT_CHANNEL:-whatsapp}"
      ALERT_THRESHOLD: "${ALERT_THRESHOLD:-4}"
      MIN_CONFIDENCE: "${MIN_CONFIDENCE:-0.6}"
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: services/dashboard/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKERS: "kafka:9092"
      POSTGRES_URL: "postgresql://rates:${POSTGRES_PASSWORD:-changeme}@postgres:5432/rates"
    ports:
      - "8080:8000"
    restart: unless-stopped

volumes:
  kafka_data:
  postgres_data:
